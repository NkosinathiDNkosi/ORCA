<!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>
        ORCA Admin | Login
      </title>
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&display=swap" rel="stylesheet">
      <style>
        :root{--red:#d32f2f;--gold:#c7924b;--line:rgba(255,255,255,.16);--muted:rgba(255,255,255,.72)}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Manrope,sans-serif;color:white;background:radial-gradient(circle at 15% 10%,rgba(211,47,47,.34),transparent 28%),radial-gradient(circle at 80% 0,rgba(199,146,75,.25),transparent 26%),linear-gradient(135deg,#070709,#151517)}.wrap{width:min(440px,92vw)}.card{padding:34px;border-radius:30px;background:rgba(255,255,255,.09);border:1px solid var(--line);backdrop-filter:blur(24px);box-shadow:0 30px 100px rgba(0,0,0,.34)}.logo{width:150px;height:92px;margin:0 auto 18px;border-radius:22px;overflow:hidden;background:#050505;border:1px solid var(--line);padding:7px}.logo img{width:100%;height:100%;object-fit:contain;object-position:center}.brand{text-align:center;margin-bottom:24px}.brand h1{margin:0;font-size:1.65rem;font-weight:900;letter-spacing:-.04em}.brand p{margin:8px 0 0;color:var(--muted);line-height:1.5}.notice{margin-bottom:14px;padding:13px;border-radius:16px;background:rgba(211,47,47,.18);border:1px solid rgba(211,47,47,.32);text-align:center;font-weight:800}.success{background:rgba(34,197,94,.16);border-color:rgba(34,197,94,.3)}label{display:block;margin:14px 0 8px;font-weight:800}input{width:100%;padding:15px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.92);font:inherit;outline:none;color:#111}button{width:100%;margin-top:18px;padding:15px;border:0;border-radius:16px;background:linear-gradient(135deg,var(--red),#8f1d1d);color:white;font-weight:900;font-size:1rem;cursor:pointer;box-shadow:0 18px 50px rgba(211,47,47,.24)}.hint{text-align:center;margin-top:16px;color:var(--muted);font-size:.85rem}
      </style>
    </head>
    <body>
      <div class="wrap">
        {% if error %}
          <div class="notice">
            {{ error }}
          </div>
        {% endif %}
        {% if message %}
          <div class="notice success">
            {{ message }}
          </div>
        {% endif %}
        <form class="card" method="POST">
          <div class="brand">
            <div class="logo">
              <img src="{{ url_for('static', filename='logo.jpg') }}" alt="ORCA logo">
            </div>
            <h1>
              ORCA Admin Portal
            </h1>
            <p>
              Secure access for project bookings and client enquiry management.
            </p>
          </div>
          <label>
          Username
          </label>
          <input name="username" required placeholder="admin">
          <label>
          Password
          </label>
          <input name="password" type="password" required placeholder="••••••••">
          <button>
            Enter Dashboard
          </button>
        </form>
      </div>
    </body>
  </html>
