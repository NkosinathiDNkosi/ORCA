<!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>
        ORCA Admin | Security
      </title>
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&display=swap" rel="stylesheet">
      <style>
        body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Manrope,sans-serif;color:white;background:radial-gradient(circle at 15% 10%,rgba(211,47,47,.28),transparent 30%),linear-gradient(135deg,#070709,#151517)}.card{width:min(460px,92vw);padding:32px;border-radius:30px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(24px);box-shadow:0 30px 100px rgba(0,0,0,.32)}h1{margin:0;font-size:1.8rem}p{color:rgba(255,255,255,.72);line-height:1.5}.notice{padding:13px;border-radius:16px;margin-bottom:12px;background:rgba(211,47,47,.2);font-weight:800}.success{background:rgba(34,197,94,.18)}label{display:block;margin:14px 0 8px;font-weight:800}input{width:100%;box-sizing:border-box;padding:15px;border-radius:16px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.94);font:inherit}button,.btn{display:inline-flex;justify-content:center;width:100%;box-sizing:border-box;text-decoration:none;margin-top:14px;padding:15px;border:0;border-radius:16px;background:#d32f2f;color:white;font-weight:900;cursor:pointer}.btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16)}
      </style>
    </head>
    <body>
      <form class="card" method="POST">
        {% if error %}
          <div class="notice">
            {{ error }}
          </div>
        {% endif %}
        {% if success %}
          <div class="notice success">
            {{ success }}
          </div>
        {% endif %}
        <h1>
          Security Settings
        </h1>
        <p>
          Update the admin password to keep the ORCA booking dashboard protected.
        </p>
        <label>
        Current password
        </label>
        <input type="password" name="current_password" required>
        <label>
        New password
        </label>
        <input type="password" name="new_password" required minlength="6">
        <button>
          Update Password
        </button>
        <a class="btn" href="{{ url_for('dashboard') }}">
        Back to Dashboard
        </a>
      </form>
    </body>
  </html>
